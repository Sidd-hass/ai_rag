services:
  # 1. AI Engine (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Automation: Pulls Mistral model on startup
  ollama-pull-model:
    image: curlimages/curl:latest
    container_name: ollama-pull-model
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"mistral\"}'"

  # 3. Backend (FastAPI)
  backend:
    build: .
    container_name: fastapi_backend
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./uploads:/app/uploads
      - ./vector_db:/app/vector_db

  # 4. Frontend (Streamlit) - ADDED THIS
  frontend:
    build: .
    container_name: streamlit_ui
    # This overrides the Dockerfile's CMD to start Streamlit
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"

  # 5. Reverse Proxy (Caddy)
  caddy:
    image: caddy:latest
    container_name: caddy_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  caddy_data:
  caddy_config: